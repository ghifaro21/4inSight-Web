                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="{{ url_for('halaman_grade') }}" class="nav-item active">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
              />
            </svg>
            <span>Grades</span>
          </a>
        </li>
        <li>
          <a href="{{ url_for('about') }}" class="nav-item">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"

        </li>
        <li>
          <a
            href="{{ url_for('logout_route') }}"
            class="nav-item"
            style="color: var(--error)"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"

      </ul>
      <div class="sidebar-footer">
        <p>&copy; 2025 4in Sight</p>
      </div>
    </nav>

    <main class="main-content">
      <div class="welcome-section fade-in">
        <h1>Add New <span class="bg-gradient-text">Grade</span></h1>
        <p class="text-muted">Enter course details below.</p>
      </div>

      <div
        class="card fade-in fade-in-delay-1"
        style="max-width: 600px; margin: 0 auto"
      >
        <form method="POST">
          <div class="form-group">
            <label class="form-label" for="semester">Semester</label>
            <div style="position: relative">
              <select
                class="form-control"
                id="semester"
                name="semester"
                required
              >
                <option value="" disabled selected>Select Semester</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="mata_kuliah">Course Name</label>
            <input
              type="text"
              class="form-control"
              id="mata_kuliah"
              name="mata_kuliah"
              placeholder="e.g. Algoritma Pemrograman"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="sks">SKS (Credits)</label>
            <input
              type="number"
              class="form-control"
              id="sks"
              name="sks"
              placeholder="e.g. 3"
              min="1"
              max="6"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="nilai">Score (0-100)</label>
            <input
              type="number"
              class="form-control"
              id="nilai"
              name="nilai"
              placeholder="e.g. 85"
              min="0"
              max="100"
              required
            />
            <small
              class="text-muted"
              style="font-size: 0.8rem; margin-top: 4px; display: block"
            >
              Auto-convert: 85+ (A), 80+ (AB), 75+ (B), 70+ (BC), 60+ (C), 50+
              (D)
            </small>
          </div>

          <div style="display: flex; gap: 16px; margin-top: 32px">
            <button type="submit" class="btn btn-primary btn-block">
              Save Grade
            </button>
            <a
              href="{{ url_for('halaman_grade') }}"
              class="btn btn-secondary btn-block"
              style="text-align: center"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
