<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Grade | 4in Sight</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}" />
</head>
<body>
    <!-- Sidebar (Custom App Design) -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" />
        </div>
        <ul class="nav-links">
            <li>
                <a href="{{ url_for('dashboard') }}" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('halaman_grade') }}" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span>Grades</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('about') }}" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span>About</span>
                </a>
            </li>
            <li>
                <a href="{{ url_for('logout_route') }}" class="nav-item" style="color: var(--error)">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <p>&copy; 2025 4in Sight</p>
        </div>
    </nav>

    <main class="main-content">
        <div class="welcome-section fade-in">
            <h1>Edit <span class="bg-gradient-text">Grade</span></h1>
            <p class="text-muted">Update your course details below.</p>
        </div>

        <div class="card fade-in fade-in-delay-1 mx-auto" style="max-width: 600px;">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label" for="semester">Semester</label>
                    <select class="form-select border-radius-custom py-2" id="semester" name="semester" required>
                        <option value="1" {% if grade.semester == 1 %}selected{% endif %}>Semester 1</option>
                        <option value="2" {% if grade.semester == 2 %}selected{% endif %}>Semester 2</option>
                        <option value="3" {% if grade.semester == 3 %}selected{% endif %}>Semester 3</option>
                        <option value="4" {% if grade.semester == 4 %}selected{% endif %}>Semester 4</option>
                        <option value="5" {% if grade.semester == 5 %}selected{% endif %}>Semester 5</option>
                        <option value="6" {% if grade.semester == 6 %}selected{% endif %}>Semester 6</option>
                        <option value="7" {% if grade.semester == 7 %}selected{% endif %}>Semester 7</option>
                        <option value="8" {% if grade.semester == 8 %}selected{% endif %}>Semester 8</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="mata_kuliah">Course Name</label>
                    <input type="text" class="form-control py-2" id="mata_kuliah" name="mata_kuliah" value="{{ grade.mata_kuliah }}" required />
                </div>

                <div class="mb-4">
                    <label class="form-label" for="sks">SKS (Credits)</label>
                    <input type="number" class="form-control py-2" id="sks" name="sks" value="{{ grade.sks }}" min="1" max="6" required />
                </div>

                <div class="mb-4">
                    <label class="form-label" for="nilai">Score (0-100)</label>
                    <input type="number" class="form-control py-2" id="nilai" name="nilai" placeholder="Re-enter score to update grade" min="0" max="100" required />
                    <div class="mt-2 p-2 rounded-3 bg-light border">
                        <small class="text-muted d-block">Current stored grade: <strong>{{ grade.nilai }}</strong></small>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-primary flex-grow-1 py-2">Update Grade</button>
                    <a href="{{ url_for('halaman_grade') }}" class="btn btn-secondary flex-grow-1 py-2">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        /* Small overrides to make Bootstrap look like the theme */
        :root {
            --radius-custom: 12px;
        }
        .form-control, .form-select, .btn {
            border-radius: var(--radius-custom) !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%) !important;
            border: none !important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3) !important;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4) !important;
        }
    </style>
</body>
</html>
